<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="Live Rig">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#141a35"/>
      <stop offset="1" stop-color="#1c1030"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="0.5" stop-color="#a06bff"/>
      <stop offset="1" stop-color="#ff6ac1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- Stream Deck grid motif (left) -->
  <g transform="translate(70,96)" opacity="0.95">
    <g fill="none" stroke="url(#accent)" stroke-width="2.5">
      <rect x="0"   y="0"  width="52" height="52" rx="9"/>
      <rect x="66"  y="0"  width="52" height="52" rx="9"/>
      <rect x="132" y="0"  width="52" height="52" rx="9"/>
      <rect x="0"   y="66" width="52" height="52" rx="9"/>
      <rect x="66"  y="66" width="52" height="52" rx="9"/>
      <rect x="132" y="66" width="52" height="52" rx="9"/>
    </g>
    <!-- one lit button -->
    <rect x="66" y="66" width="52" height="52" rx="9" fill="url(#accent)" opacity="0.9" filter="url(#glow)"/>
  </g>

  <!-- Piano keys motif (bottom strip) -->
  <g transform="translate(70,250)" opacity="0.85">
    <rect x="0" y="0" width="1140" height="46" rx="6" fill="#0e1430" stroke="#2a3358" stroke-width="1.5"/>
    <g fill="#e8ecff">
      <rect x="10"  y="8" width="26" height="30" rx="3"/>
      <rect x="44"  y="8" width="26" height="30" rx="3"/>
      <rect x="78"  y="8" width="26" height="30" rx="3"/>
      <rect x="112" y="8" width="26" height="30" rx="3"/>
      <rect x="146" y="8" width="26" height="30" rx="3"/>
    </g>
    <g fill="#0b1020">
      <rect x="28"  y="8" width="16" height="18" rx="2"/>
      <rect x="62"  y="8" width="16" height="18" rx="2"/>
      <rect x="130" y="8" width="16" height="18" rx="2"/>
    </g>
    <!-- signal line running across -->
    <path d="M 200 24 q 40 -22 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0 t 80 0"
          fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.9"/>
  </g>

  <!-- Title -->
  <g transform="translate(300,120)">
    <text x="0" y="0" font-family="Menlo, Consolas, monospace" font-size="82" font-weight="700" fill="#ffffff" letter-spacing="2">LIVE RIG</text>
    <rect x="4" y="20" width="470" height="5" rx="2.5" fill="url(#accent)"/>
    <text x="4" y="66" font-family="-apple-system, Segoe UI, sans-serif" font-size="26" fill="#aab4d8">
      One keyboard. One surface. Sounds, mixer &amp; lights — switched per song.
    </text>
    <text x="4" y="104" font-family="Menlo, Consolas, monospace" font-size="18" fill="#7f8bb5">
      Stream Deck  →  Bome  →  Ableton  ·  config-as-code
    </text>
  </g>
</svg>
